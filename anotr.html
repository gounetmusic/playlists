    <style>
        :root {
            --bg-overlay: rgba(15, 15, 15, 0.85);
            --card: rgb(0, 0, 0);
            --text: #ffffff;

        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f0f0f;
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Aligne le contenu vers le haut */
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;

        .background-blur {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;         
            background-image: url('https://cdn-images.dzcdn.net/images/cover/9e22bdf26b91b8f82543ff6b449e58fd-0e0fc43b434cdf5ed495ce85764203c1-5b8377e014eeeab9feecb6b27bd1ace9-984a0348364b46e380f502dfda368909/1000x1000-000000-80-0-0.jpg');

            background-position: center;
            filter: blur(20px);
            -webkit-filter: blur(20px);
            transform: scale(1.1);
            z-index: -2;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-overlay);
            z-index: -1;
        }

        .container { 
            width: 95%; 
            max-width: 400px; 
            text-align: center; 
            padding: 20px 20px 40px 20px;
            position: relative;
            z-index: 1;
            margin-top: 5vh;
        }

        .cover { 
            width: 50%;          
            max-width: 240px;   
            min-width: 150px;
            aspect-ratio: 1 / 1; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        .artist-crop {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            overflow: hidden;
            background-color: #1a1a1a;
            aspect-ratio: 4 / 1; 
        }

        .artist-crop img {
            width: 100%;
            height: 100%; 
            object-fit: cover; 
            object-position: 50% 75%; 
        }

        .link-card { 
            background: var(--card); 
            display: flex; 
            align-items: center; 
            padding: 14px 18px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: white; 
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s ease-in-out;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .link-card:hover { background: rgba(40, 40, 40, 0.95); transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }

        .platform-icon { 
            width: 32px;
            height: 32px; 
            margin-right: 15px; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            border-radius: 6px;
        }

        .platform-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }

        .platform-name { flex-grow: 1; text-align: left; font-weight: 600; font-size: 1rem; }

        .btn-play { font-size: 0.7rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .amazon-icon-bg {
            background-color: #ffffff !important;
            padding: 3px;
            box-sizing: border-box;
            border-radius: 6px;
